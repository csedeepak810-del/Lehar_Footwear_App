<!--

  Ionic pages and navigation.
-->
<ion-header>
  <ion-navbar>
    <ion-title>{{'Point Category'|translate}}</ion-title>
  </ion-navbar>
  <ion-toolbar>
    <div class="search add-search">
      <div class="filter">
        <ion-searchbar type='text' name='search_key' [(ngModel)]="filter.search_key" (keydown.enter)="getPointcategorylist()">
        </ion-searchbar>
      </div>
    </div>
  </ion-toolbar>

  
</ion-header>


<ion-content padding>
  <ion-refresher (ionRefresh)="doRefresh($event)">
    <ion-refresher-content pullingIcon="arrow-dropdown" pullingText="Pull to refresh" refreshingSpinner="circles"
    refreshingText="Refreshing...">
</ion-refresher-content>
</ion-refresher>

<div  class="Point-main" *ngFor="let list of category_list; let i=index">
  <div class="point-block">
  <div class="point-content">
    <p><strong>{{'Point Category Name'|translate}}</strong> :<span>{{list.point_category_name}}</span></p>
    <p><strong>{{'Influencer Point'|translate}}</strong> :<span>{{list.influencer_point}}</span></p>
  </div>
  </div>
  
</div>

<div class="nothing-here" style="height: 50%;" *ngIf="category_list.length == 0">
    <div class="outer">
        <div class="innear">
            <img src="assets/imgs/no_found.svg" alt="">
            <p>{{'Data Not Available' | translate}}</p>
        </div>
    </div>
</div>

 <ion-infinite-scroll threshold="100px" (ionInfinite)="loadData($event)" *ngIf="flag!=1">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more data...">
    </ion-infinite-scroll-content>
</ion-infinite-scroll>

  

</ion-content>
