	<div class="map-add mp_tp">
		<div class="map-adderes" *ngIf="contact.address">
			<a><i class="material-icons">room</i></a>
			<p>{{contact.address}}</p>
		</div>

		<div class="contect">
			<ul>
				<li *ngIf="contact.contact_number">
					<button style="background-color: transparent;position: relative;display: contents;" (click)="openDialer(contact.contact_number)"><i class="material-icons green-clr" style="font-size: 22px; margin-left: 10px;">call</i></button>
					<p>{{contact.contact_number}}</p>
				</li>
				<li *ngIf="contact.contact_number_2">
					<button style="background-color: transparent;position: relative;display: contents;" (click)="openDialer(contact.contact_number_2)"><i class="material-icons green-clr" style="font-size: 22px; margin-left: 10px;">call</i></button>
					<p>{{contact.contact_number_2}}</p>
				</li>
				<li *ngIf="contact.calling_no">
					<button style="background-color: transparent;position: relative;display: contents;" (click)="openDialer(contact.calling_no)"><i class="material-icons green-clr" style="font-size: 22px; margin-left: 10px;">call</i></button>
					<p>{{contact.calling_no}}</p>
				</li>
				<li *ngIf="contact.whatsapp_no">
					<a href="https://api.whatsapp.com/send?phone={{contact.whatsapp_no}}" rel="whatsapp"
						target="_system">
						<img src="assets/imgs/whatsapp.png" class="h25">
						<p> {{contact.whatsapp_no}}</p>
					</a>
				</li>

				<li *ngIf="contact.email">
					<a href="mailto:{{contact.email}}">
						<i class="material-icons">email</i>
						<p>{{contact.email}}</p>
					</a>
				</li>
				<li *ngIf="contact.url">
					<a href="{{contact.url}}">
						<i class="material-icons">web</i>
						<p>{{contact.url}}</p>
					</a>
				</li>
			</ul>
		</div>
	</div>
</ion-content>
