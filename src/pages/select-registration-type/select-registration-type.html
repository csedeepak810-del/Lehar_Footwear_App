<ion-header class="header-border">
	<ion-toolbar color="white">
		<div class="logo">
			<img src="/assets/imgs/logo.png" alt="">
		</div>
	</ion-toolbar>
</ion-header>
<ion-content>
	<div class="user-types">
		<ion-list radio-group [(ngModel)]="data.registerType">
			<div class="list-header">
				Select Login Type
			</div>
			<ion-item >
				<ion-label>Distributor/Direct Dealer</ion-label>
				<ion-radio color="secondary" value="DrLogin"></ion-radio>
			</ion-item>
			<ion-item>
				<ion-label>Employee</ion-label>
				<ion-radio color="secondary" value="Employee"></ion-radio>
			</ion-item>
			<!-- <ion-item>
				<ion-label>Plumber/Electrician/Retailer(Counter boy)</ion-label>
				<ion-radio color="secondary" value="Other"></ion-radio>
			</ion-item> -->
		</ion-list>
	</div>
	<div class="text-right mr16">
		<button ion-button round outline color="secondary" class="Buttons" [disabled]="!data?.registerType"
			(click)="goToRegisterPage()">Continue</button>
	</div>


	<ion-fab left bottom>
		<a (click)="goOnContactPage()">
			<img src="assets/imgs/call.png" class="h45">
		</a>
	</ion-fab>
	<!-- <ion-fab left bottom>
		<a (click)="goOnContactPage()">
			<img src="assets/imgs/whatsapp.png" class="h45">
		</a>
	</ion-fab> -->

</ion-content>
